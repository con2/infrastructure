apiVersion: v1
kind: ServiceAccount
metadata:
  name: qb-arc-runners
  namespace: arc-runners
---
---
# NOTE: this policy is still WIP, we're not even there yet
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: actions-runner
rules:
- apiGroups: ["", "apps", "networking.k8s.io", "extensions", "batch"] # "" indicates the core API group
  resources: ["deployments", "services", "configmaps", "secrets", "ingresses", "persistentvolumeclaims", "cronjobs", "statefulsets", "pods"]
  verbs: ["get", "watch", "list", "patch", "update", "delete", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: qb-actions-runner
subjects:
- kind: ServiceAccount
  name: qb-arc-runners
  namespace: arc-runners
roleRef:
  kind: ClusterRole
  name: actions-runner
  apiGroup: rbac.authorization.k8s.io
